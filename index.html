<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生肖 BOSS 雲端同步器</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e272e; color: #d2dae2; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #0fbcf9; margin-bottom: 10px; }
        .controls { text-align: center; margin-bottom: 20px; }
        .btn-permission { background: #ff3f34; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* 網格排版：電腦 4 格 -> 平板 2 格 -> 手機 1 格 */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        @media (max-width: 1100px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }

        .category-card { background: #485460; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); border-top: 5px solid #0fbcf9; margin-bottom: 10px; }
        .category-card h3 { margin: 0 0 10px 0; color: #fff; border-bottom: 1px solid #808e9b; padding-bottom: 5px; text-align: center; }
        .boss-row { display: flex; flex-direction: column; margin-bottom: 12px; background: #3c40c6; padding: 10px; border-radius: 8px; }
        .boss-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: bold; font-size: 1em; }
        .boss-controls { display: flex; flex-direction: column; gap: 8px; }
        .input-group { display: flex; align-items: center; justify-content: space-between; }
        .button-group { display: flex; gap: 5px; justify-content: space-between; }
        
        input[type="number"] { width: 50px; padding: 5px; border-radius: 4px; border: none; text-align: center; font-weight: bold; }
        button { cursor: pointer; border: none; border-radius: 4px; padding: 8px; font-weight: bold; font-size: 0.9em; flex: 1; }
        .btn-default { background: #3498db; color: white; }
        .btn-start { background: #0be881; color: #1e272e; }
        .btn-stop { background: #ffc048; color: #1e272e; }
        
        .status { font-weight: bold; color: #ffd32a; }
        .status.early-warning { color: #ff9f43; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }
    </style>
</head>
<body>

    <h1>⚔️ BOSS 雲端同步器 ⚔️</h1>
    <div class="controls">
        <button class="btn-permission" onclick="requestPermission()">🔔 開啟通知權限 (必點)</button>
    </div>

    <div class="grid-container" id="boss-grid"></div>

    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" preload="auto"></audio>

    <script>
        // 1. 設定所有 BOSS 資料
        const bossData = [
            { id: 'sx1', cat: '🦁 生肖區', name: '生肖 3-5', def: 240, color: '#f53b57' },
            { id: 'sx2', cat: '🦁 生肖區', name: '生肖 6-8', def: 270, color: '#f53b57' },
            { id: 'sx3', cat: '🦁 生肖區', name: '生肖 9-10', def: 300, color: '#f53b57' },
            { id: 'd1', cat: '🐉 獨立 BOSS', name: '龍宮', def: 360, color: '#0fbcf9' },
            { id: 'd2', cat: '🐉 獨立 BOSS', name: '達摩', def: 210, color: '#0fbcf9' },
            { id: 'k1', cat: '⚔️ 三國專區', name: '三國跨服 A', def: 480, color: '#ffa801' },
            { id: 'k2', cat: '⚔️ 三國專區', name: '三國跨服 B', def: 360, color: '#ffa801' },
            { id: 'l1', cat: '⚔️ 三國專區', name: '本服王', def: 300, color: '#ffa801' },
            { id: 'xj1', cat: '☁️ 仙境專區', name: '仙境', def: 240, color: '#9b59b6' }
        ];

        // 2. 絕對優先執行：把 UI 畫面畫出來！
        function renderUI() {
            const grid = document.getElementById('boss-grid');
            grid.innerHTML = "";
            const categories = [...new Set(bossData.map(b => b.cat))];
            categories.forEach(cat => {
                const bosses = bossData.filter(b => b.cat === cat);
                let html = `<div class="category-card" style="border-top-color: ${bosses[0].color}"><h3>${cat}</h3>`;
                bosses.forEach(b => {
                    html += `
                    <div class="boss-row">
                        <div class="boss-info"><span>${b.name}</span> <span class="status" id="status_${b.id}">等待中</span></div>
                        <div class="boss-controls">
                            <div class="input-group"><span>剩餘分鐘:</span> <input type="number" id="time_${b.id}" value="${b.def}"></div>
                            <div class="button-group">
                                <button class="btn-default" onclick="updateCloud('${b.id}', ${b.def})">預設</button>
                                <button class="btn-start" onclick="manualStart('${b.id}')">開始</button>
                                <button class="btn-stop" onclick="clearCloud('${b.id}')">清除</button>
                            </div>
                        </div>
                    </div>`;
                });
                grid.innerHTML += html + `</div>`;
            });
        }
        
        // 立即畫出介面
        renderUI();

        // 3. 畫面出來後，再來處理 Firebase 雲端連線
        let db;
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyBO3GguL4BiEaW39dzDzsFvzCXo7Xd4TNg",
                authDomain: "bosstimertest-36fa5.firebaseapp.com",
                databaseURL: "https://bosstimertest-36fa5-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "bosstimertest-36fa5",
                storageBucket: "bosstimertest-36fa5.firebasestorage.app",
                messagingSenderId: "317237801226",
                appId: "1:317237801226:web:768e755b872fdf07138af3"
            };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();

            // 監聽雲端資料庫
            db.ref('bosses').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                bossData.forEach(b => {
                    const info = data[b.id];
                    if (info && info.endTime) {
                        runLocalTimer(b.id, info.endTime, b.name);
                    } else {
                        stopLocalTimer(b.id);
                    }
                });
            });
        } catch (error) {
            console.error("Firebase 連線發生錯誤:", error);
            alert("目前無法連線到雲端資料庫，但畫面已載入！");
        }

        // 4. 計時器核心邏輯
        let localTimers = {};
        let warned = {};

        function runLocalTimer(id, endTime, name) {
            if (localTimers[id]) clearInterval(localTimers[id]);
            warned[id] = false;
            const tick = () => {
                const now = Date.now();
                const remain = Math.max(0, Math.round((endTime - now) / 1000));
                const el = document.getElementById('status_' + id);
                if(!el) return;
                updateDisplay(el, remain);
                
                if (remain <= 300 && remain > 0 && !warned[id]) {
                    warned[id] = true;
                    el.classList.add('early-warning');
                    triggerNotice("⏳ 準備出發！", `${name} 5分鐘後刷新`);
                }
                
                if (remain <= 0) {
                    clearInterval(localTimers[id]);
                    el.classList.remove('early-warning');
                    el.innerText = "🚨已刷新！";
                    el.style.color = "#ff3f34";
                    if (warned[id] !== 'done') {
                        warned[id] = 'done';
                        triggerNotice("🚨 BOSS 刷新！", `${name} 已經刷新了！`);
                    }
                }
            };
            tick();
            localTimers[id] = setInterval(tick, 1000);
        }

        function stopLocalTimer(id) {
            if (localTimers[id]) clearInterval(localTimers[id]);
            const el = document.getElementById('status_' + id);
            if(el) { el.innerText = "等待中"; el.style.color = "#ffd32a"; el.classList.remove('early-warning'); }
        }

        function updateCloud(id, mins) {
            if(!db) return alert("尚未連上雲端！");
            const endTime = Date.now() + (mins * 60 * 1000);
            db.ref
