<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生肖 BOSS 雲端同步器</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e272e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e272e; color: #d2dae2; margin: 0; padding: 15px; transition: box-shadow 0.3s; }
        h1 { text-align: center; color: #0fbcf9; margin-bottom: 10px; font-size: 1.6em; }
        .controls { text-align: center; margin-bottom: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn-permission { background: #ff3f34; color: white; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .discord-toggle { background: #2f3640; padding: 8px 15px; border-radius: 8px; border: 1px solid #7289da; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .discord-toggle input { transform: scale(1.3); cursor: pointer; }
        .discord-toggle span { font-weight: bold; color: #7289da; font-size: 0.95em; }

        /* 網格排版：鎖定 850px 以下才變 2 格，確保 1080p 四分之一視窗 (960px) 依然是 4 格 */
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 850px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .grid-container { grid-template-columns: 1fr; } }

        .category-card { background: #485460; padding: 10px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); border-top: 5px solid #0fbcf9; margin-bottom: 8px; }
        .category-card h3 { margin: 0 0 8px 0; color: #fff; border-bottom: 1px solid #808e9b; padding-bottom: 5px; text-align: center; font-size: 1.1em; }
        .boss-row { display: flex; flex-direction: column; margin-bottom: 10px; background: #3c40c6; padding: 8px; border-radius: 8px; transition: background-color 0.3s; }
        
        .boss-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 5px; }
        .boss-name-group { display: flex; flex-direction: column; min-width: 0; }
        .boss-name { font-weight: bold; font-size: 1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .expected-time { font-size: 0.8em; color: #a4b0be; margin-top: 2px; white-space: nowrap; }
        
        .boss-controls { display: flex; flex-direction: column; gap: 6px; }
        .input-group { display: flex; align-items: center; justify-content: space-between; font-weight: bold; font-size: 0.9em; }
        .button-group { display: flex; gap: 4px; justify-content: space-between; }
        
        /* 全新輸入框樣式：深色底、半透明 Placeholder */
        input[type="number"] { width: 45px; padding: 4px; border-radius: 4px; border: 1px solid #576574; background: #2f3542; color: #fff; text-align: center; font-weight: bold; outline: none; transition: 0.2s; }
        input[type="number"]::placeholder { color: rgba(255, 255, 255, 0.4); font-weight: normal; }
        input[type="number"]:focus { border-color: #0fbcf9; background: #1e272e; box-shadow: 0 0 5px rgba(15, 188, 249, 0.5); }
        
        button.action-btn { cursor: pointer; border: none; border-radius: 4px; padding: 6px 2px; font-weight: bold; font-size: 0.85em; flex: 1; white-space: nowrap; }
        .btn-default { background: #3498db; color: white; }
        .btn-start { background: #0be881; color: #1e272e; }
        .btn-stop { background: #ffc048; color: #1e272e; }
        
        .status { font-weight: bold; color: #ffd32a; font-size: 1em; padding: 2px 0px; border-radius: 4px; text-align: right; white-space: nowrap; }
        .status.early-warning { color: #ff9f43; animation: blink 1s infinite alternate; }
        
        @keyframes flashRed { 0% { background-color: rgba(255, 63, 52, 0.5); } 100% { background-color: transparent; } }
        .overtime-flash { animation: flashRed 1s infinite; color: #ff3f34 !important; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }
        @keyframes pageFlash { 0% { box-shadow: inset 0 0 80px rgba(255, 63, 52, 0.9); } 100% { box-shadow: inset 0 0 0px transparent; } }
        .body-flash { animation: pageFlash 1s infinite alternate; }
    </style>
</head>
<body>

    <h1>⚔️ BOSS 雲端同步器 ⚔️</h1>
    <div class="controls">
        <label class="discord-toggle">
            <input type="checkbox" id="discordCheckbox">
            <span>🖥️ 作為伺服器：發送 Discord 通知 (僅電腦端打勾)</span>
        </label>
        <button class="btn-permission" onclick="initAudio()">🔊 點擊授權網頁音效 (必點)</button>
    </div>

    <div class="grid-container" id="boss-grid"></div>

    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" preload="auto"></audio>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1478359998135537787/L1y7Tl_SWETDo7WuKSeGcNptfIDjtR0-TpwjcaIxWP5PrBrcmbhQj6yv1NqC4MnZ6YzC";
        
        const discordCheckbox = document.getElementById('discordCheckbox');
        discordCheckbox.checked = localStorage.getItem('discordEnabled') === 'true';
        discordCheckbox.addEventListener('change', (e) => {
            localStorage.setItem('discordEnabled', e.target.checked);
        });

        function initAudio() {
            const audio = document.getElementById('alarmSound');
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                alert("🔊 網頁提示音效已準備就緒！");
            }).catch(e => {
                alert("無法播放音效，請確認未開啟靜音設定。");
            });
        }

        function playAlarm() {
            const audio = document.getElementById('alarmSound');
            audio.currentTime = 0;
            audio.play().catch(e => console.log("音效播放被阻擋", e));
        }

        function sendDiscordMsg(message) {
            if (!discordCheckbox.checked) return; 
            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: message })
            }).catch(err => console.log('Discord 發送失敗', err));
        }

        const bossData = [
            { id: 'sx1', cat: '🦁 生肖區', name: '生肖 3-5', def: 240, color: '#f53b57' },
            { id: 'sx2', cat: '🦁 生肖區', name: '生肖 6-8', def: 270, color: '#f53b57' },
            { id: 'sx3', cat: '🦁 生肖區', name: '生肖 9-10', def: 300, color: '#f53b57' },
            { id: 'd1', cat: '🐉 獨立 BOSS', name: '龍宮', def: 360, color: '#0fbcf9' },
            { id: 'd2', cat: '🐉 獨立 BOSS', name: '達摩一', def: 210, color: '#0fbcf9' },
            { id: 'd3', cat: '🐉 獨立 BOSS', name: '達摩三', def: 210, color: '#0fbcf9' },
            { id: 'k1', cat: '⚔️ 三國專區', name: '三國跨服 久', def: 480, color: '#ffa801' },
            { id: 'k2', cat: '⚔️ 三國專區', name: '三國跨服 快', def: 300, color: '#ffa801' },
            { id: 'l1', cat: '⚔️ 三國專區', name: '本服王', def: 300, color: '#ffa801' },
            { id: 'xj1', cat: '☁️ 仙境專區', name: '仙境一', def: 240, color: '#9b59b6' },
            { id: 'xj2', cat: '☁️ 仙境專區', name: '仙境二', def: 240, color: '#9b59b6' }
        ];

        function renderUI() {
            const grid = document.getElementById('boss-grid');
            grid.innerHTML = "";
            const categories = [...new Set(bossData.map(b => b.cat))];
            categories.forEach(cat => {
                const bosses = bossData.filter(b => b.cat === cat);
                let html = `<div class="category-card" style="border-top-color: ${bosses[0].color}"><h3>${cat}</h3>`;
                bosses.forEach(b => {
                    // 加入 onkeypress 監聽 Enter 鍵
                    html += `
                    <div class="boss-row" id="row_${b.id}">
                        <div class="boss-info">
                            <div class="boss-name-group">
                                <span class="boss-name" title="${b.name}">${b.name}</span>
                                <span class="expected-time" id="expected_${b.id}">--:-- 刷新</span>
                            </div>
                            <span class="status" id="status_${b.id}">等待中</span>
                        </div>
                        <div class="boss-controls">
                            <div class="input-group">
                                <span>剩餘分:</span> 
                                <input type="number" id="time_${b.id}" placeholder="${b.def}" onkeypress="if(event.key === 'Enter') manualStart('${b.id}', ${b.def})">
                            </div>
                            <div class="button-group">
                                <button class="action-btn btn-default" onclick="updateCloud('${b.id}', ${b.def})">預設</button>
                                <button class="action-btn btn-start" onclick="manualStart('${b.id}', ${b.def})">開始</button>
                                <button class="action-btn btn-stop" onclick="clearCloud('${b.id}')">清除</button>
                            </div>
                        </div>
                    </div>`;
                });
                grid.innerHTML += html + `</div>`;
            });
        }
        
        renderUI();

        let db;
        let currentEndTimes = {}; 
        let localTimers = {};
        let warned = {};
        let warningBosses = new Set(); 

        try {
            const firebaseConfig = {
                apiKey: "AIzaSyBO3GguL4BiEaW39dzDzsFvzCXo7Xd4TNg",
                authDomain: "bosstimertest-36fa5.firebaseapp.com",
                databaseURL: "https://bosstimertest-36fa5-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "bosstimertest-36fa5",
                storageBucket: "bosstimertest-36fa5.firebasestorage.app",
                messagingSenderId: "317237801226",
                appId: "1:317237801226:web:768e755b872fdf07138af3"
            };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();

            db.ref('bosses').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                bossData.forEach(b => {
                    const info = data[b.id];
                    if (info && info.endTime) {
                        if (currentEndTimes[b.id] !== info.endTime) {
                            currentEndTimes[b.id] = info.endTime;
                            runLocalTimer(b.id, info.endTime, b.name);
                        }
                    } else {
                        if (currentEndTimes[b.id]) {
                            delete currentEndTimes[b.id];
                            stopLocalTimer(b.id);
                        }
                    }
                });
            });
        } catch (error) {
            console.error("連線錯誤:", error);
        }

        function updateGlobalFlash() {
            if (warningBosses.size > 0) {
                document.body.classList.add('body-flash');
            } else {
                document.body.classList.remove('body-flash');
            }
        }

        function runLocalTimer(id, endTime, name) {
            if (localTimers[id]) clearInterval(localTimers[id]);
            warned[id] = false;
            
            const expectedDate = new Date(endTime);
            const eh = String(expectedDate.getHours()).padStart(2, '0');
            const em = String(expectedDate.getMinutes()).padStart(2, '0');
            const expectedEl = document.getElementById('expected_' + id);
            if(expectedEl) expectedEl.innerText = `${eh}:${em} 刷新`;
            
            const tick = () => {
                const now = Date.now();
                const diff = Math.round((endTime - now) / 1000);
                const el = document.getElementById('status_' + id);
                const rowEl = document.getElementById('row_' + id);
                if(!el || !rowEl) return;
                
                const currentHour = new Date().getHours();
                const mentionTag = (currentHour >= 3 && currentHour < 7) ? "" : "@here ";

                if (diff > 0) {
                    el.classList.remove('overtime-flash');
                    rowEl.classList.remove('overtime-flash');
                    
                    const h = Math.floor(diff / 3600);
                    const m = Math.floor((diff % 3600) / 60);
                    const s = diff % 60;
                    el.innerText = h > 0 ? `${h}時${m}分${s}秒` : `${m}分${s}秒`;
                    
                    if (diff <= 300) {
                        warningBosses.add(id);
                        updateGlobalFlash();
                        
                        if (!warned[id]) {
                            warned[id] = true;
                            el.classList.add('early-warning');
                            playAlarm(); 
                            sendDiscordMsg(`${mentionTag}⏳ **準備出發！** \n[${name}] 將在 5 分鐘後刷新！`);
                        }
                    } else {
                        warningBosses.delete(id);
                        updateGlobalFlash();
                    }
                } else {
                    warningBosses.delete(id);
                    updateGlobalFlash();
                    
                    const overSec = Math.abs(diff);
                    const overM = Math.floor(overSec / 60);
                    const overS = overSec % 60;
                    
                    el.classList.remove('early-warning');
                    el.classList.add('overtime-flash');
                    rowEl.classList.add('overtime-flash');
                    el.innerText = `🚨超時 ${overM}分${overS}秒`;
                    
                    if (warned[id] !== 'done') {
                        warned[id] = 'done';
                        playAlarm(); 
                        sendDiscordMsg(`${mentionTag}🚨 **BOSS 已經刷新！** \n快上！[${name}] 已經出了！`);
                    }
                }
            };
            tick();
            localTimers[id] = setInterval(tick, 1000);
        }

        function stopLocalTimer(id) {
            if (localTimers[id]) clearInterval(localTimers[id]);
            
            warned[id] = false; 
            warningBosses.delete(id);
            updateGlobalFlash();

            const el = document.getElementById('status_' + id);
            const rowEl = document.getElementById('row_' + id);
            const expectedEl = document.getElementById('expected_' + id);
            
            if(el && rowEl) { 
                el.innerText = "等待中"; 
                el.style.color = "#ffd32a"; 
                el.classList.remove('early-warning', 'overtime-flash'); 
                rowEl.classList.remove('overtime-flash');
                if(expectedEl) expectedEl.innerText = "--:-- 刷新";
            }
        }

        function updateCloud(id, mins) {
            if(!db) return alert("尚未連上雲端！");
            const endTime = Date.now() + (mins * 60 * 1000);
            db.ref('bosses/' + id).set({ endTime: endTime });
        }

        // 修改：加入 defMins 參數，處理防呆機制與框內清空
        function manualStart(id, defMins) {
            const inputEl = document.getElementById('time_' + id);
            let mins = inputEl.value;
            
            // 防呆：如果什麼都沒填就按 Enter 或開始，預設採用半透明的那個時間
            if (!mins || mins.trim() === '') {
                mins = defMins;
            } else {
                mins = parseFloat(mins);
            }
            
            updateCloud(id, mins);
            
            // 啟動後自動清空輸入框，並移除輸入游標焦點
            inputEl.value = '';
            inputEl.blur(); 
        }

        function clearCloud(id) { 
            if(db) db.ref('bosses/' + id).remove(); 
        }
    </script>
</body>
</html>
